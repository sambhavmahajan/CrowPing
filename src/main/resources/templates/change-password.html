<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{fragments.html :: header}"></div>
<th:block th:if="${error != null}">
    <p th:text="${error}"></p>
</th:block>
<th:block th:if="${success != null}">
    <p th:text="${success}"></p>
</th:block>
<form th:action="@{/dashboard/changepassword}" method="POST">
    <label>
        <input type="text" th:value="${dto.email}" readonly/>
    </label>
    <label for="password"></label><input type="password" id="password" name="password" placeholder="Current Password"/>
    <label for="newpassword"></label><input type="password" name="newpassword" id="newpassword" placeholder="New Password"/>
    <label for="confirmnewpassword"></label><input type="password" name="confirmnewpassword" id="confirmnewpassword" placeholder="Confirm New Password"/>
    <input type="submit" value="Change Password"/>
</form>
</body>
</html>

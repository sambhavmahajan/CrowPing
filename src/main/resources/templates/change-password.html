<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .password-reset-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .reset-form-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .reset-form-header h2 {
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .password-requirements {
            font-size: 0.8rem;
            color: #777;
            margin-top: 5px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<div class="password-reset-container">
    <div th:replace="~{fragments.html :: header}"></div>
    <th:block th:if="${error != null}">
        <p th:text="${error}"></p>
    </th:block>
    <th:block th:if="${success != null}">
        <p th:text="${success}"></p>
    </th:block>
    <div class="reset-form-header">
        <h2>Set a New Password</h2>
    </div>

    <form id="passwordResetForm" th:action="@{/dashboard/changepassword}" method="POST">
        <div class="form-group">
            <label for="password">Current Password</label>
            <input type="password" id="password" name="password" placeholder="Current Password" required>
        </div>
        <div class="form-group">
            <label for="newpassword">New Password</label>
            <input type="password" name="newpassword" id="newpassword" placeholder="New Password" required
                   title="Must contain at least one number, one uppercase and lowercase letter, and at least 8 or more characters">
            <p class="password-requirements">Must contain at least one number, one uppercase and lowercase letter, and at least 8 or more characters.</p>
        </div>

        <div class="form-group">
            <label for="confirmnewpassword">Confirm New Password</label>
            <input type="password" name="confirmnewpassword" id="confirmnewpassword" placeholder="Confirm New Password" required>
        </div>

        <button type="submit" class="submit-btn">Reset Password</button>
    </form>
</div>
<script>
    const resetForm = document.getElementById('passwordResetForm');
    const newPassword = document.getElementById('new-password');
    const confirmNewPassword = document.getElementById('confirm-password');

    resetForm.addEventListener('submit', function(e) {
        if (newPassword.value !== confirmNewPassword.value) {
            confirmNewPassword.setCustomValidity('Passwords do not match.');
            e.preventDefault(); // Stop form submission
        } else {
            confirmNewPassword.setCustomValidity('');
        }
    });
</script>
</body>
</html>

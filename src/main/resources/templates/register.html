<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .floating-form-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .floating-form-container h2 { text-align: center; margin-bottom: 25px; }

        /* -- The core styles for floating labels -- */
        .form-group-float {
            position: relative;
            margin-bottom: 25px;
        }
        .form-group-float .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group-float .form-label {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #999;
            background-color: #fff; /* Match form background */
            padding: 0 5px;
            transition: all 0.2s ease;
            pointer-events: none; /* Allows clicks to go through to the input */
        }
        /*
            The main effect. When the input is focused or when the placeholder is NOT shown
            (meaning it has content), move the label up and shrink it.
        */
        .form-group-float .form-control:focus + .form-label,
        .form-group-float .form-control:not(:placeholder-shown) + .form-label {
            top: -10px; /* Moves the label above the input */
            left: 8px;
            font-size: 0.8rem;
            color: #007bff;
        }
        /* Add the focus color to the border as well */
        .form-group-float .form-control:focus {
            outline: none;
            border-color: #007bff;
        }

        /* --- Submit button --- */
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments.html :: header}"></div>
<div class="floating-form-container">
    <th:block th:if="${message != null && bgcolor != null}">
        <p th:text="${message}" th:bgcolor="${bgcolor}"></p>
    </th:block>
    <h2>Register</h2>
    <form th:method="POST" th:action="@{/register}" th:object="${registerDTO}">
        <!-- The placeholder must be a non-empty string for the CSS :placeholder-shown to work correctly -->
        <div class="form-group-float">
            <input th:field="*{email}" th:type="email" id="float-email" name="username" class="form-control" placeholder=" " required>
            <label for="float-email" class="form-label">Email</label>
        </div>

        <div class="form-group-float">
            <input th:field="*{password}" th:type="password" type="password" name="password" id="float-control" class="form-control" placeholder=" " required>
            <label for="float-subject" class="form-label">Password</label>
        </div>
        <div class="form-group-float">
            <input th:field="*{confirmPassword}" th:type="password" name="password" id="float-subject" class="form-control" placeholder=" " required>
            <label for="float-subject" class="form-label">Confirm Password</label>
        </div>
        <button type="submit" class="submit-btn">Signup</button>
    </form>
</div>
</body>
</html>

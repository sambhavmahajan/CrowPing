<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{fragments.html :: header}"></div>
<th:block th:if="${message != null && bgcolor != null}">
<p th:text="${message}" th:bgcolor="${bgcolor}"></p>
</th:block>
<form th:method="POST" th:action="@{/register}" th:object="${registerDTO}">
    <div class="mb-3">
        <label for="email">Email</label>
        <input th:field="*{email}" th:type="email" id="email" name="email" class="form-control"/>
    </div>
    <div class="mb-3">
        <label for="password">Password</label>
        <input  th:field="*{password}" th:type="password" id="password" name="password" class="form-control"/>
    </div>
    <div class="mb-3">
        <label for="confirm password">Confirm Password</label>
        <input th:field="*{confirmPassword}" th:type="password" id="confirm password" name="confirmPassword" class="form-control"/>
    </div>
    <input type="submit" value="SignUp" class="btn btn-primary"/>
    </div>
</form>
</body>
</html>
